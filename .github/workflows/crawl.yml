name: Hourly Crawl & Summarize

on:
  schedule:
    - cron: '0 * * * *'  # 매 시간 정각
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.pipeline.txt

      - name: Install dependencies
        run: pip install -r requirements.pipeline.txt

      - name: Download models from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          huggingface-cli download SSEUNGSSEUNGWOO/newszips-classifier \
            --local-dir models \
            --token $HF_TOKEN
          echo "=== models 디렉토리 ==="
          ls models/
          echo "=== BERT 모델 ==="
          ls models/klue_bert_classifier/

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          echo "=== pwd ==="
          pwd
          echo "=== models/ ==="
          ls -la models/ || echo "models 없음"
          echo "=== models/klue_bert_classifier/ ==="
          ls models/klue_bert_classifier/ || echo "klue_bert_classifier 없음"
          python pipeline/run_pipeline.py
