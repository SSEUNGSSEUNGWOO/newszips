name: Hourly Crawl & Summarize

on:
  schedule:
    - cron: '0 9 * * *'  # 매일 오전 9시 (UTC 기준, 한국 오후 6시)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.pipeline.txt

      - name: Install dependencies
        run: pip install -r requirements.pipeline.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git log -1 --oneline
          echo "=== classify_and_summarize.py line 50-70 ==="
          sed -n '50,70p' pipeline/classify_and_summarize.py
          echo "=== tfidf files ==="
          ls models/tfidf_vectorizers/ || echo "없음"
          python pipeline/run_pipeline.py
